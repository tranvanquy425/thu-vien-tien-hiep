<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thư Viện Tiên Hiệp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/theme.css">
<!-- áp theme SỚM để tránh nháy (id77) -->
<script>(function(){var t=localStorage.getItem('tvth-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})()</script>
</head>
<body>
<div class="topbar">
  <a class="logo" href="index.html">
    <span class="seal">仙</span>
    <span class="brandtext"><b>Thư Viện Tiên Hiệp</b><small>Tra cứu nhân vật · sự kiện · thế lực · pháp bảo · công pháp</small></span>
  </a>
  <span class="spacer"></span>
  <button class="theme-toggle" id="themeToggle" title="Đổi giao diện sáng/tối" aria-label="Đổi giao diện">
    <span class="tt-icon" id="themeIcon">🌙</span><span id="themeLabel">Tối</span>
  </button>
</div>

<div class="wrap">
  <div class="page-head">
    <h1>Tàng Thư Các</h1>
    <span class="sub">Mỗi bộ một khu vực riêng · bám sát nguyên tác, có neo chương</span>
  </div>
  <div class="flourish"><span class="gem">❖ TÀNG THƯ ❖ CÁC ❖</span></div>
  <div id="boCards" class="cards grid-2"></div>
</div>

<script src="assets/config.js"></script>
<script src="assets/chrome.js"></script>
<!-- theme toggle logic (id77) -->
<script>
(function(){
  function applyTheme(t){
    if(t==='light'){document.documentElement.setAttribute('data-theme','light');}
    else{document.documentElement.removeAttribute('data-theme');}
    var ic=document.getElementById('themeIcon'),lb=document.getElementById('themeLabel');
    if(ic)ic.textContent=t==='light'?'☀':'🌙';
    if(lb)lb.textContent=t==='light'?'Sáng':'Tối';
  }
  var cur=localStorage.getItem('tvth-theme')||'dark';
  applyTheme(cur);
  var btn=document.getElementById('themeToggle');
  if(btn)btn.addEventListener('click',function(){
    cur=cur==='light'?'dark':'light';
    localStorage.setItem('tvth-theme',cur);
    applyTheme(cur);
  });
})();
</script>
<script>
  const wrap = document.getElementById("boCards");
  const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
  (window.LIB_CONFIG.boList || []).forEach(b => {
    const a = document.createElement("a");
    a.className = "card" + (b.anh ? " card-has-img" : ""); a.href = "bo.html?bo=" + b.slug;
    const imgHtml = b.anh
      ? '<div class="card-img-wrap"><img class="card-img" src="' + esc(b.anh) + '" alt="' + esc(b.ten) + '" loading="lazy"></div>'
      : '';
    a.innerHTML =
      '<div class="card-body">' +
      '<h3>' + esc(b.ten) + ' <span class="cn">' + esc(b.cn||"") + '</span></h3>' +
      '<div class="cn" style="font-family:var(--sans);color:var(--muted2)">Tác giả: ' + esc(b.tacGia||"—") + '</div>' +
      '<div class="blurb">' + esc(b.blurb||"") + '</div>' +
      '<div class="meta-row">' +
        '<span class="chip gold">7 mục tra cứu</span>' +
        '<span class="chip">Đọc truyện</span><span class="chip">Nhân vật</span><span class="chip">Cảnh giới</span>' +
      '</div>' +
      '</div>' +
      imgHtml;
    wrap.appendChild(a);
  });
</script>
</body>
</html>
