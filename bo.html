<!-- theme toggle logic (id77) -->
<script>
(function(){
  function applyTheme(t){
    if(t==='light'){document.documentElement.setAttribute('data-theme','light');}
    else{document.documentElement.removeAttribute('data-theme');}
    var ic=document.getElementById('themeIcon'),lb=document.getElementById('themeLabel');
    if(ic)ic.textContent=t==='light'?'☀':'🌙';
    if(lb)lb.textContent=t==='light'?'Sáng':'Tối';
  }
  var cur=localStorage.getItem('tvth-theme')||'dark';
  applyTheme(cur);
  var btn=document.getElementById('themeToggle');
  if(btn)btn.addEventListener('click',function(){
    cur=cur==='light'?'dark':'light';
    localStorage.setItem('tvth-theme',cur);
    applyTheme(cur);
  });
})();
</script>
<script>/* nạp dữ liệu thật của bộ (data.js) + chương đọc (reader.js) trước app.js — chạy cả local lẫn deploy.
   reader.js có thể chưa có (chỉ khi đã dựng) → 404 vô hại, mục Đọc truyện sẽ báo chưa có chương. */
(function(){var s=new URLSearchParams(location.search).get("bo")||"tien-nghich";
document.write('<scr'+'ipt src="data/'+s+'/data.js"><\/scr'+'ipt>');
document.write('<scr'+'ipt src="data/'+s+'/cotTruyen.js" onerror="window.__noCot=1"><\/scr'+'ipt>');
document.write('<scr'+'ipt src="data/'+s+'/reader.js" onerror="window.__noReader=1"><\/scr'+'ipt>');})();</script>
