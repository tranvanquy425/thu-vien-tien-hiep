<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tìm kiếm — Thư Viện Tiên Hiệp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/theme.css">
<script>(function(){var t=localStorage.getItem('tvth-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})()</script>
</head>
<body>
<div class="topbar">
  <a class="logo" href="index.html">
    <span class="seal">仙</span>
    <span class="brandtext"><b>Thư Viện Tiên Hiệp</b><small>Tra cứu nhân vật · sự kiện · thế lực · pháp bảo · công pháp</small></span>
  </a>
  <span class="spacer"></span>
  <button class="theme-toggle" id="themeToggle" title="Đổi giao diện sáng/tối" aria-label="Đổi giao diện">
    <span class="tt-icon" id="themeIcon">🌙</span><span id="themeLabel">Tối</span>
  </button>
</div>

<div class="wrap">
  <div class="page-head">
    <h1>Tìm kiếm</h1>
  </div>

  <!-- Search input lớn -->
  <div style="margin:0 0 20px">
    <div class="gs-inner" style="max-width:600px">
      <input class="gs-input" id="searchInput" type="text" placeholder="Tìm nhân vật, pháp bảo, sự kiện..." autofocus>
      <button class="gs-btn" id="searchBtn">🔍</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<!-- Load data -->
<script src="assets/config.js"></script>
<script src="assets/chrome.js"></script>
<!-- Theme toggle -->
<script>
(function(){
  function applyTheme(t){
    if(t==='light'){document.documentElement.setAttribute('data-theme','light');}
    else{document.documentElement.removeAttribute('data-theme');}
    var ic=document.getElementById('themeIcon'),lb=document.getElementById('themeLabel');
    if(ic)ic.textContent=t==='light'?'☀':'🌙';
    if(lb)lb.textContent=t==='light'?'Sáng':'Tối';
  }
  var cur=localStorage.getItem('tvth-theme')||'dark';
  applyTheme(cur);
  var btn=document.getElementById('themeToggle');
  if(btn)btn.addEventListener('click',function(){
    cur=cur==='light'?'dark':'light';
    localStorage.setItem('tvth-theme',cur);
    applyTheme(cur);
  });
})();
</script>

<script>
// Dynamically load data.js + cotTruyen.js for each bộ
const CFG = window.LIB_CONFIG;
const boList = CFG.boList || [];

function loadScript(src) {
  return new Promise((ok, fail) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = ok;
    s.onerror = fail;
    document.head.appendChild(s);
  });
}

async function loadAllData() {
  const promises = [];
  for (const b of boList) {
    promises.push(loadScript("data/" + b.slug + "/data.js").catch(() => {}));
    promises.push(loadScript("data/" + b.slug + "/cotTruyen.js").catch(() => {}));
  }
  await Promise.all(promises);
}

function normalize(s) {
  // Simple lowercase + remove diacritics for Vietnamese
  return (s || "").toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/đ/g, "d").replace(/Đ/g, "D");
}

function search(query) {
  const q = normalize(query);
  if (!q) return [];
  const results = [];
  const DATA = window.LIB_DATA || {};
  const CT = window.LIB_COTTRUYEN || {};

  for (const b of boList) {
    const d = DATA[b.slug];
    if (!d) continue;
    const boName = b.ten;
    const boSlug = b.slug;

    // Characters
    if (d.characters && d.characters.chars) {
      for (const c of d.characters.chars) {
        const fields = [c.name, ...(c.aliases || []), c.vaiTro || ""];
        if (fields.some(f => normalize(f).includes(q))) {
          results.push({ type: "Nhân vật", name: c.name, bo: boName, link: "bo.html?bo=" + boSlug + "#nhan-vat", aliases: (c.aliases||[]).join(", ") });
        }
      }
    }

    // Artifacts
    if (d.artifacts && d.artifacts.artifacts) {
      for (const a of d.artifacts.artifacts) {
        const fields = [a.name, ...(a.aliases || [])];
        if (fields.some(f => normalize(f).includes(q))) {
          results.push({ type: "Pháp bảo", name: a.name, bo: boName, link: "bo.html?bo=" + boSlug + "#phap-bao" });
        }
      }
    }

    // Techniques
    if (d.techniques && d.techniques.techniques) {
      for (const t of d.techniques.techniques) {
        const fields = [t.name, ...(t.aliases || [])];
        if (fields.some(f => normalize(f).includes(q))) {
          results.push({ type: "Công pháp", name: t.name, bo: boName, link: "bo.html?bo=" + boSlug + "#cong-phap" });
        }
      }
    }

    // Realms
    if (d.realms && d.realms.realms) {
      for (const r of d.realms.realms) {
        if (normalize(r.name).includes(q)) {
          results.push({ type: "Cảnh giới", name: r.name, bo: boName, link: "bo.html?bo=" + boSlug + "#canh-gioi" });
        }
      }
    }

    // Map
    if (d.map && d.map.places) {
      for (const p of d.map.places) {
        if (normalize(p.name).includes(q)) {
          results.push({ type: "Địa điểm", name: p.name, bo: boName, link: "bo.html?bo=" + boSlug + "#map" });
        }
      }
    }

    // Factions
    if (d.factions && d.factions.factions) {
      for (const f of d.factions.factions) {
        const fields = [f.name, ...(f.aliases || [])];
        if (fields.some(x => normalize(x).includes(q))) {
          results.push({ type: "Thế lực", name: f.name, bo: boName, link: "bo.html?bo=" + boSlug + "#nhan-vat" });
        }
      }
    }

    // Cốt truyện
    const ct = CT[boSlug];
    if (ct && Array.isArray(ct)) {
      for (const ep of ct) {
        const tieuDe = ep.tieuDe || ep.title || "";
        const tomTat = ep.tomTat || ep.summary || "";
        if (normalize(tieuDe).includes(q) || normalize(tomTat).includes(q)) {
          results.push({ type: "Cốt truyện", name: tieuDe || tomTat.slice(0, 60), bo: boName, link: "bo.html?bo=" + boSlug + "#cot-truyen" });
        }
      }
    }
  }

  return results;
}

function renderResults(results, query) {
  const el = document.getElementById("results");
  if (!query) { el.innerHTML = '<p style="color:var(--muted)">Nhập từ khoá để tìm kiếm.</p>'; return; }
  if (results.length === 0) {
    el.innerHTML = '<p style="color:var(--muted)">Không tìm thấy kết quả cho "<b>' + esc(query) + '</b>".</p>';
    return;
  }

  // Group by type
  const groups = {};
  for (const r of results) {
    if (!groups[r.type]) groups[r.type] = [];
    groups[r.type].push(r);
  }

  let html = '<p style="color:var(--muted);margin-bottom:16px">Tìm thấy <b>' + results.length + '</b> kết quả cho "<b>' + esc(query) + '</b>"</p>';

  for (const [type, items] of Object.entries(groups)) {
    html += '<h3 style="color:var(--gold2);margin:18px 0 8px;font-family:var(--display)">' + esc(type) + ' (' + items.length + ')</h3>';
    for (const item of items) {
      html += '<a href="' + esc(item.link) + '" class="search-result">';
      html += '<span class="sr-name">' + esc(item.name) + '</span>';
      if (item.aliases) html += '<span class="sr-alias">' + esc(item.aliases) + '</span>';
      html += '<span class="sr-bo">' + esc(item.bo) + '</span>';
      html += '</a>';
    }
  }

  el.innerHTML = html;
}

const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (q) {
    history.replaceState(null, "", "search.html?q=" + encodeURIComponent(q));
  }
  const results = search(q);
  renderResults(results, q);
}

loadAllData().then(() => {
  const params = new URLSearchParams(location.search);
  const q = params.get("q") || "";
  document.getElementById("searchInput").value = q;
  if (q) doSearch();

  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });
  document.getElementById("searchBtn").addEventListener("click", doSearch);
});
</script>
</body>
</html>
